<script>
// ─── IMPORTANT TERMS ────────────────────────────────────────────────────────
const IMPORTANT_TERMS = {
  'MyIS': { title: 'MyIS — ServiceNow Portal', desc: 'MyIS is ABB\'s ServiceNow portal. Use it to raise software Request tickets (RITM) for procurement and Incident tickets (INC) for software issues.' },
  'CHGPL': { title: 'CHGPL — Mandatory Procurement Channel', desc: 'CHGPL is the ABB Information Systems Ltd charge code in ABACUS. All global software licenses must be procured EXCLUSIVELY through CHGPL. Never source outside CHGPL.' },
  'GLR': { title: 'GLR — Global License Register', desc: 'The Global License Register is where country IS organizations report usage of globally contracted software. All software in the GLR is chargeable via CHGPL invoices.' },
  'Zero Tolerance': { title: 'ABB Zero Tolerance Policy', desc: 'ABB has a ZERO TOLERANCE policy towards software non-compliance. Unauthorized installations are detected every fortnight. Violations may result in investigation and disciplinary action.' },
  'CLM': { title: 'CLM — Country License Manager', desc: 'The Country License Manager is your point of contact for all local software procurement. The CLM provides 2–3 competitive quotations from IS-authorized vendors.' },
  'SDIP Portal': { title: 'SDIP Portal — OCC', desc: 'The SDIP Portal (OCC) is the mandatory approval system for Open Source Software in ABB. All OSS must be approved through this portal BEFORE installation and use.' },
  'Company Portal': { title: 'Company Portal', desc: 'The Company Portal is ABB\'s centralized self-service platform for approved freeware. No approval needed to install listed apps. Some software may carry charges displayed at install time.' },
  'IS Charges Review Portal': { title: 'IS Charges Review Portal', desc: 'The IS Charges Review Portal lets you unsubscribe unused software licenses with a single click. Requests are sent to the software owner for approval before charges are removed.' },
  'Country SAM': { title: 'Country SAM — Software Asset Manager', desc: 'The Country Software Asset Manager oversees software compliance in your country. Contact the Country SAM for help with the Authorized Software List or compliance notifications.' },
  'GBS SCM': { title: 'GBS SCM — Supply Chain Management', desc: 'For local software procurement, Business Areas must raise Purchase Requests or Purchase Orders through the GBS SCM team. Share the PO with IS to proceed with vendor engagement.' },
  'OSM': { title: 'OSM — Operations & Software Management', desc: 'OSM owns and administers the Global License Register (GLR) database. They define GLR software products in coordination with Global Vendor Managers.' }
};

let popupTimeoutId = null;

function showImportantPopup(key, event) {
  event.stopPropagation();
  const info = IMPORTANT_TERMS[key];
  if (!info) return;
  document.getElementById('helpPopup').style.display = 'none';
  document.getElementById('important-popup-body').innerHTML = `<div class="popup-title">${info.title}</div><div class="popup-desc">${info.desc}</div>`;
  document.getElementById('important-popup').style.display = 'block';
  if (popupTimeoutId) clearTimeout(popupTimeoutId);
  popupTimeoutId = setTimeout(() => closeImportantPopup(), 6000);
}

function closeImportantPopup() {
  if (popupTimeoutId) clearTimeout(popupTimeoutId);
  document.getElementById('important-popup').style.display = 'none';
}

document.addEventListener('click', (e) => {
  const ip = document.getElementById('important-popup');
  const closeBtn = document.getElementById('important-popup-close');
  if (ip.contains(e.target) || e.target === closeBtn || e.target.classList.contains('important-link')) return;
  if (ip.style.display === 'block') closeImportantPopup();
}, true);

function injectImportantLinks(html) {
  const terms = ['IS Charges Review Portal','Zero Tolerance','SDIP Portal','Company Portal','Country SAM','GBS SCM','MyIS','CHGPL','GLR','CLM','OSM'];
  terms.forEach(term => {
    const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(?<!<[^>]*)\\b(${escaped})\\b(?![^<]*>)`, 'g');
    let count = 0;
    html = html.replace(regex, (match) => {
      count++;
      if (count <= 2) return `<span class="important-link" onclick="showImportantPopup('${term}', event)" title="Click to learn more about ${term}">${match}</span>`;
      return match;
    });
  });
  return html;
}

let searchMatches = [];
let currentMatchIndex = 0;
let sidebarOpen = true;
let manualToggleLock = false;
let _suppressHashLoad = false;
let autoStartGuide = true;

// ─── PAGES / STEPS ───────────────────────────────────────────────────────────

const FILE_PAGE_MAP = {
  'software licensing.md': 'software_licensing',
  'is charges.md': 'is_charges',
  'local software.md': 'local_software',
  'freeware in abb.md': 'freeware',
  'oss in abb.md': 'oss',
  'authorized software.md': 'authorized_software',
  'guidelines to use removable media.md': 'removable_media',
  'unsubscribe license.md': 'unsubscribe'
};

function determinePageType(filename) {
  const clean = filename.toLowerCase().trim();
  if (FILE_PAGE_MAP[clean]) return FILE_PAGE_MAP[clean];
  for (let key in FILE_PAGE_MAP) {
    if (clean.includes(key) || key.includes(clean)) return FILE_PAGE_MAP[key];
  }
  return 'default';
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('closed', !sidebarOpen);
  manualToggleLock = true;
  setTimeout(() => {
    manualToggleLock = false;
    if (presenter.isPlaying && !presenter.isPaused) {
      const step = presenter.steps[presenter.currentStepIndex];
      if (step) presenter.positionAtContent(step[4]);
    }
  }, 350);
}

document.getElementById('sidebarToggle').addEventListener('click', toggleSidebar);

document.addEventListener('mousemove', (e) => {
  if (manualToggleLock) return;
  const wasSidebarOpen = sidebarOpen;
  if (e.clientX < 30) sidebarOpen = true;
  else if (e.clientX > 320) sidebarOpen = false;
  if (wasSidebarOpen !== sidebarOpen) {
    document.getElementById('sidebar').classList.toggle('closed', !sidebarOpen);
    setTimeout(() => {
      if (presenter.isPlaying && !presenter.isPaused) {
        const step = presenter.steps[presenter.currentStepIndex];
        if (step) presenter.positionAtContent(step[4]);
      }
    }, 350);
  }
});

function loadCategory(event, path) {
  presenter.stopGuide();

  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

}

// ─── SEARCH ──────────────────────────────────────────────────────────────────
function highlightSearch(text) {
  const contentEl = document.getElementById('content');
  const searchTerm = text.trim().toLowerCase();
  if (!searchTerm) {
    clearHighlights();
    document.getElementById('searchCounter').textContent = '';
    document.getElementById('searchClearBtn').classList.remove('active');
    return;
  }
  if (!contentEl.dataset.originalHtml) contentEl.dataset.originalHtml = contentEl.innerHTML;
  else contentEl.innerHTML = contentEl.dataset.originalHtml;
  const regex = new RegExp('(' + searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  const walker = document.createTreeWalker(contentEl, NodeFilter.SHOW_TEXT, null, false);
  let node; const nodesToReplace = [];
  while (node = walker.nextNode()) {
    if (regex.test(node.nodeValue)) { nodesToReplace.push(node); regex.lastIndex = 0; }
  }
  searchMatches = [];
  nodesToReplace.forEach(node => {
    const span = document.createElement('span');
    span.innerHTML = node.nodeValue.replace(regex, '<span class="search-highlight">$1</span>');
    node.parentNode.replaceChild(span, node);
    span.querySelectorAll('.search-highlight').forEach(h => searchMatches.push(h));
  });
  if (searchMatches.length > 0) {
    currentMatchIndex = 0;
    updateMatchDisplay();
    document.getElementById('searchClearBtn').classList.add('active');
  } else {
    document.getElementById('searchCounter').textContent = '0 results';
    document.getElementById('searchClearBtn').classList.add('active');
  }
}

function updateMatchDisplay() {
  document.querySelectorAll('.search-highlight.active-match').forEach(el => el.classList.remove('active-match'));
  if (searchMatches.length > 0) {
    searchMatches[currentMatchIndex].classList.add('active-match');
    searchMatches[currentMatchIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
    document.getElementById('searchCounter').textContent = (currentMatchIndex + 1) + '/' + searchMatches.length;
  }
}

function nextMatch() { if (!searchMatches.length) return; currentMatchIndex = (currentMatchIndex + 1) % searchMatches.length; updateMatchDisplay(); }
function prevMatch() { if (!searchMatches.length) return; currentMatchIndex = (currentMatchIndex - 1 + searchMatches.length) % searchMatches.length; updateMatchDisplay(); }

function clearHighlights() {
  const contentEl = document.getElementById('content');
  if (contentEl.dataset.originalHtml) { contentEl.innerHTML = contentEl.dataset.originalHtml; delete contentEl.dataset.originalHtml; }
  searchMatches = []; currentMatchIndex = 0;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  clearHighlights();
  document.getElementById('searchCounter').textContent = '';
  document.getElementById('searchClearBtn').classList.remove('active');
}

document.addEventListener('DOMContentLoaded', () => {
  const si = document.getElementById('searchInput');
  if (si) {
    si.addEventListener('input', e => highlightSearch(e.target.value));
    si.addEventListener('keydown', e => { if (e.key === 'Enter') e.shiftKey ? prevMatch() : nextMatch(); });
  }
});

// ─── SPEED ───────────────────────────────────────────────────────────────────
let currentSpeed = 1.15;
const SPEED_MIN = 0.5;
const SPEED_MAX = 2.0;

function changeSpeed(delta) {
  currentSpeed = Math.round((currentSpeed + delta) * 100) / 100;
  currentSpeed = Math.max(SPEED_MIN, Math.min(SPEED_MAX, currentSpeed));
  document.getElementById('speedDisplay').textContent = currentSpeed.toFixed(2).replace(/\.?0+$/, '') + 'x';
  if (presenter.isPlaying && !presenter.isPaused && presenter.currentUtterance) {
    presenter._speedChanging = true;
    presenter.synth.cancel();
    presenter.currentUtterance = null;
    if (presenter.timeoutId) clearTimeout(presenter.timeoutId);
    setTimeout(() => {
      presenter._speedChanging = false;
      if (presenter.isPlaying && !presenter.isPaused) presenter.playStep();
    }, 80);
  }
}

// ─── PRESENTER CLASS ─────────────────────────────────────────────────────────
class PresenterGuide {
  constructor() {
    this.synth = window.speechSynthesis;
    this.isPaused = false;
    this.isPlaying = false;
    this.currentStepIndex = 0;
    this.steps = [];
    this.currentUtterance = null;
    this.timeoutId = null;
    this.selectedVoice = null;
    this.lastHighlightedEl = null;
    this._speedChanging = false;
  }

  selectVoice() {
    const voices = this.synth.getVoices();
    if (!voices || voices.length === 0) return;

    // 1. Prefer named female voices
    const femaleNames = ['Aria','Zira','Victoria','Karen','Samantha','Susan','Moira','Google US English Female','Microsoft Zira','Microsoft Aria'];
    for (let name of femaleNames) {
      const v = voices.find(v => v.name.includes(name));
      if (v) { this.selectedVoice = v; return; }
    }
    // 2. Any voice with "female" in name
    const femV = voices.find(v => v.name.toLowerCase().includes('female'));
    if (femV) { this.selectedVoice = femV; return; }
    // 3. Indian English
    const inV = voices.find(v => v.lang === 'en-IN' || v.lang === 'en_IN');
    if (inV) { this.selectedVoice = inV; return; }
    // 4. Any English
    const enV = voices.find(v => v.lang && v.lang.startsWith('en'));
    if (enV) { this.selectedVoice = enV; return; }
    // 5. Default first available
    this.selectedVoice = voices[0] || null;
  }

  setSteps(arr) { this.steps = arr; }

  findElementByKeyword(keyword) {
    if (!keyword) return null;
    const contentEl = document.getElementById('content');
    if (!contentEl) return null;
    const search = keyword.toLowerCase().trim();

    const headings = Array.from(contentEl.querySelectorAll('h1,h2,h3,h4,h5,h6'));
    let match = headings.find(h => h.textContent.toLowerCase().includes(search));
    if (match) return match;

    const strongs = Array.from(contentEl.querySelectorAll('strong,b'));
    match = strongs.find(s => s.textContent.toLowerCase().includes(search));
    if (match) {
      let el = match;
      while (el && el !== contentEl) {
        const tag = el.tagName.toLowerCase();
        if (['p','li','td','th','blockquote','pre'].includes(tag)) return el;
        el = el.parentElement;
      }
      return match;
    }

    const listItems = Array.from(contentEl.querySelectorAll('li'));
    match = listItems.find(li => li.textContent.toLowerCase().includes(search));
    if (match) return match;

    const cells = Array.from(contentEl.querySelectorAll('td,th'));
    match = cells.find(c => c.textContent.toLowerCase().includes(search));
    if (match) return match;

    const paras = Array.from(contentEl.querySelectorAll('p'));
    match = paras.find(p => p.textContent.toLowerCase().includes(search));
    if (match) return match;

    const walker = document.createTreeWalker(contentEl, NodeFilter.SHOW_TEXT, null, false);
    let node;
    while ((node = walker.nextNode())) {
      if (node.nodeValue && node.nodeValue.toLowerCase().includes(search)) {
        let el = node.parentElement;
        let depth = 0;
        while (el && el !== contentEl && depth < 10) {
          const tag = el.tagName.toLowerCase();
          if (['h1','h2','h3','h4','h5','h6','p','li','td','th','blockquote','pre','section','article'].includes(tag)) return el;
          el = el.parentElement;
          depth++;
        }
        return node.parentElement;
      }
    }

    const parts = search.split(' ').filter(w => w.length >= 3);
    for (const part of parts) {
      const hM = headings.find(h => h.textContent.toLowerCase().includes(part));
      if (hM) return hM;
      const pM = paras.find(p => p.textContent.toLowerCase().includes(part));
      if (pM) return pM;
      const lM = listItems.find(li => li.textContent.toLowerCase().includes(part));
      if (lM) return lM;
    }

    return contentEl.querySelector('h1,h2,h3,p,li') || contentEl;
  }

  clearContentHighlight() {
    if (this.lastHighlightedEl) {
      this.lastHighlightedEl.classList.remove('presenter-content-highlight');
      this.lastHighlightedEl = null;
    }
  }

  positionAtContent(keyword) {
    const container = document.getElementById('presenter-container');
    this.clearContentHighlight();
    const targetEl = this.findElementByKeyword(keyword);
    if (!targetEl) return;
    targetEl.classList.add('presenter-content-highlight');
    this.lastHighlightedEl = targetEl;
    targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => {
      const rect = targetEl.getBoundingClientRect();
      const presenterW = 230, presenterH = 290;
      const windowW = window.innerWidth, windowH = window.innerHeight;
      const headerH = 60, margin = 20;
      let newTop = rect.top + rect.height / 2 - presenterH / 2;
      newTop = Math.max(headerH + margin, Math.min(windowH - presenterH - margin, newTop));
      let newLeft = windowW - presenterW - margin;
      if (rect.right > windowW - presenterW - 50) {
        const leftCandidate = rect.left - presenterW - margin;
        newLeft = leftCandidate > margin ? leftCandidate : windowW - presenterW - margin;
      }
      container.style.left = newLeft + 'px';
      container.style.top = newTop + 'px';
    }, 120);
  }

  startGuide() {
    if (!this.steps || !this.steps.length) return;

    // Ensure voices are loaded before starting
    this.selectVoice();

    this.synth.cancel();
    this.isPlaying = true;
    this.isPaused = false;
    this.currentStepIndex = 0;
    this._speedChanging = false;

    document.getElementById('pauseVoiceBtn').style.display = 'block';
    document.getElementById('speedControl').classList.remove('disabled');
    document.getElementById('guideBtn').classList.add('active');
    document.getElementById('voiceIndicator').style.display = 'inline-block';
    document.getElementById('presenter-container').style.display = 'flex';

    // Small delay to allow synth to be ready
    setTimeout(() => this.playStep(), 300);
  }

  playStep() {
    if (!this.isPlaying || this.currentStepIndex >= this.steps.length) {
      this.stopGuide();
      return;
    }

    const step = this.steps[this.currentStepIndex];
    const message = step[3];
    const keyword = step[4] || null;

    // Update bubble text
    const textEl = document.getElementById('presenter-text');
    textEl.style.animation = 'none';
    void textEl.offsetWidth;
    textEl.style.animation = 'textSlide 0.3s ease-out';
    textEl.textContent = message;

    // Highlight content
    this.clearContentHighlight();
    setTimeout(() => this.positionAtContent(keyword), 100);

    // Cancel any previous speech
    this.synth.cancel();

    // Build utterance
    const utter = new SpeechSynthesisUtterance(message);
    utter.lang = 'en-IN';
    utter.rate = currentSpeed;
    utter.pitch = 1.0;
    utter.volume = 1.0;

    // Re-select voice each step to ensure it's loaded
    if (!this.selectedVoice) this.selectVoice();
    if (this.selectedVoice) utter.voice = this.selectedVoice;

    this.currentUtterance = utter;

    const onDone = () => {
      this.currentUtterance = null;
      if (this._speedChanging) return;
      if (this.isPlaying && !this.isPaused) {
        this.currentStepIndex++;
        if (this.timeoutId) clearTimeout(this.timeoutId);
        this.timeoutId = setTimeout(() => this.playStep(), 500);
      }
    };

    utter.onend = onDone;
    utter.onerror = (e) => {
      // 'interrupted' is expected when synth.cancel() is called — not a real error
      if (e.error === 'interrupted' || e.error === 'canceled') return;
      console.warn('Speech error:', e.error);
      if (!this._speedChanging) onDone();
    };

    try {
      this.synth.speak(utter);

      // Chrome bug workaround: speech can stall after ~15 seconds
      // Periodically call resume() to keep it going
      if (this._chromeBugTimer) clearInterval(this._chromeBugTimer);
      this._chromeBugTimer = setInterval(() => {
        if (this.synth.speaking && !this.synth.paused) {
          this.synth.pause();
          this.synth.resume();
        } else {
          clearInterval(this._chromeBugTimer);
        }
      }, 10000);

    } catch (e) {
      console.warn('Speak error:', e);
      onDone();
    }
  }

  pauseVoice() {
    if (this.isPaused) {
      this.isPaused = false;
      this.synth.resume();
      document.getElementById('pauseVoiceBtn').innerText = '⏸ Pause';
      document.getElementById('pauseVoiceBtn').classList.remove('active');
    } else {
      this.synth.pause();
      this.isPaused = true;
      document.getElementById('pauseVoiceBtn').innerText = '▶ Resume';
      document.getElementById('pauseVoiceBtn').classList.add('active');
    }
  }

  stopGuide() {
    if (this.timeoutId) clearTimeout(this.timeoutId);
    if (this._chromeBugTimer) clearInterval(this._chromeBugTimer);
    this.synth.cancel();
    this.currentUtterance = null;
    this.isPlaying = false;
    this.isPaused = false;
    this.currentStepIndex = 0;
    this._speedChanging = false;
    this.clearContentHighlight();
    document.getElementById('pauseVoiceBtn').style.display = 'none';
    document.getElementById('speedControl').classList.add('disabled');
    document.getElementById('pauseVoiceBtn').innerText = '⏸ Pause';
    document.getElementById('pauseVoiceBtn').classList.remove('active');
    document.getElementById('guideBtn').innerText = '▶ Start Interactive Guide';
    document.getElementById('guideBtn').classList.remove('active');
    document.getElementById('voiceIndicator').style.display = 'none';
    document.getElementById('presenter-container').style.display = 'none';
  }
}

const presenter = new PresenterGuide();

// Load voices — browsers fire onvoiceschanged asynchronously
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => presenter.selectVoice();
  // Also try immediately in case voices are already loaded
  presenter.selectVoice();
}

// ─── GUIDE CONTROLS ──────────────────────────────────────────────────────────
function toggleGuide() { presenter.isPlaying ? stopGuide() : startGuide(); }
function togglePauseVoice() { presenter.pauseVoice(); }

function stopGuide() {
  presenter.stopGuide();
  document.getElementById('guideBtn').innerText = '▶ Start Interactive Guide';
  document.getElementById('guideBtn').classList.remove('active');
}

function startGuide() {
  const cfg = pages[currentPageType] || pages['default'];
  if (!cfg || !cfg.steps.length) return;
  document.getElementById('guideBtn').innerText = '■ Stop Guide';
  document.getElementById('guideBtn').classList.add('active');
  presenter.setSteps(cfg.steps);
  presenter.startGuide();
}

// ─── MARKDOWN LOADER ─────────────────────────────────────────────────────────
function loadMarkdownFile(path) {
  document.getElementById('content').innerHTML = '<div class="loading">Loading content...</div>';
  fetch(path)
    .then(r => {
      if (!r.ok) throw new Error('File not found: ' + path);
      return r.text();
    })
    .then(text => {
      let html = marked.parse(text);
      html = html.replace(/<img (.*?)>/g, '<div class="image-wrapper"><span class="visual-arrow">➤</span><img $1></div>');
      html = injectImportantLinks(html);
      document.getElementById('content').innerHTML = html;
      document.getElementById('content').querySelectorAll('a').forEach(link => {
        if (!link.classList.contains('important-link')) {
          link.setAttribute('target', '_blank');
          link.setAttribute('rel', 'noopener noreferrer');
        }
      });
      clearHighlights();

      // AUTO-START: wait for voices to be ready then start guide
      if (autoStartGuide) {
        const voices = window.speechSynthesis.getVoices();
        if (voices && voices.length > 0) {
          presenter.selectVoice();
          setTimeout(() => startGuide(), 600);
        } else {
          // Voices not ready yet — wait for them
          window.speechSynthesis.onvoiceschanged = () => {
            presenter.selectVoice();
            setTimeout(() => startGuide(), 300);
          };
          // Fallback: try anyway after 1.5 seconds
          setTimeout(() => {
            if (!presenter.isPlaying) {
              presenter.selectVoice();
              startGuide();
            }
          }, 1500);
        }
      }
    })
    .catch(err => {
      document.getElementById('content').innerHTML = '<p style="color:red;padding:20px;">Error loading content: ' + err.message + '</p>';
    });
}

function loadMarkdown() {
  if (_suppressHashLoad) return;
  const path = window.location.hash.substring(1).split('?')[0] || 'Software Licensing.md';
  currentPageType = determinePageType(path);
  loadMarkdownFile(path);
}

// ─── HELP ────────────────────────────────────────────────────────────────────
function toggleHelp() {
  const popup = document.getElementById('helpPopup');
  if (popup.style.display === 'block') { popup.style.display = 'none'; return; }
  closeImportantPopup();
  popup.innerHTML = `
    <button class="help-popup-close" onclick="document.getElementById('helpPopup').style.display='none'">✕</button>
    <div style="font-size:14px;line-height:1.6;color:#333;">
      <p style="margin-bottom:12px;"><b>🔴 Red Terms</b> — Click any red term (MyIS, CHGPL, GLR, etc.) to see explanation.</p>
      <p style="margin-bottom:12px;"><b>▶ Interactive Guide</b> — Voice narrates and highlights content on every page automatically.</p>
      <p style="margin-bottom:12px;"><b>🔍 Search</b> — Type to find content. Press Enter to jump between results.</p>
      <p style="margin-bottom:12px;"><b>⏸ Pause</b> — Pause or resume voice narration anytime.</p>
      <p style="margin-bottom:12px;"><b>🔊 Speed − +</b> — Adjust speed in real-time. Range: 0.5x to 2.0x.</p>
    </div>`;
  popup.style.display = 'block';
}

// ─── VISIBILITY CHANGE ───────────────────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.hidden && presenter.isPlaying && !presenter.isPaused) {
    presenter.synth.pause();
    presenter.isPaused = true;
    document.getElementById('pauseVoiceBtn').innerText = '▶ Resume';
    document.getElementById('pauseVoiceBtn').classList.add('active');
  }
});

// ─── BOOT ────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // Pre-load voices
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    presenter.selectVoice();
  }
  const path = window.location.hash.substring(1).split('?')[0] || 'Software Licensing.md';
  currentPageType = determinePageType(path);
  loadMarkdownFile(path);
});

window.addEventListener('hashchange', loadMarkdown);
</script>
